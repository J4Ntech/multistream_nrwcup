<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
</head>
<body>

<h2>Control Panel</h2>
<h3 style="color:red">TEST SET 1 OBEN LINKS</h3>

<div id="games"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD_vGptJ_ha6Z5Nk2DxjOejCWw75xevq7o",
  authDomain: "nrw-cup-multistream.firebaseapp.com",
  databaseURL: "https://nrw-cup-multistream-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nrw-cup-multistream"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function animateChange(element) {
  element.classList.remove("changed");
  void element.offsetWidth;
  element.classList.add("changed");
}
  
window.onload = function () {

  const gameContainer = document.getElementById("games");

  const titles = [
    "Set 1 OBEN LINKS",
    "Set 2 OBEN RECHTS",
    "Set 3 UNTEN LINKS",
    "Set 4 UNTEN RECHTS"
  ];

  gameContainer.innerHTML = "";

  for (let i = 1; i <= 4; i++) {

    const box = document.createElement("div");
    box.style.border = "1px solid #ccc";
    box.style.padding = "10px";
    box.style.margin = "10px";

    box.innerHTML = `
      <h3>${titles[i - 1]}</h3>

      <input id="p1-${i}" placeholder="Spieler 1"><br>
      <input id="p2-${i}" placeholder="Spieler 2"><br>

      <input id="s1-${i}" type="number" placeholder="Score 1"><br>
      <input id="s2-${i}" type="number" placeholder="Score 2"><br>

      <button onclick="update(${i})">Update Set ${i}</button>
      <button onclick="reset(${i})">Reset Score</button>
    `;

    gameContainer.appendChild(box);
  }
};

function reset(gameId) {
  const confirmReset = confirm("Willst du den Score wirklich resetten?");
  if (!confirmReset) return;

  const p1 = document.getElementById(`p1-${gameId}`);
  const p2 = document.getElementById(`p2-${gameId}`);
  const s1 = document.getElementById(`s1-${gameId}`);
  const s2 = document.getElementById(`s2-${gameId}`);

  s1.value = 0;
  s2.value = 0;

  db.ref("games/game" + gameId).set({
    player1: p1.value || "",
    player2: p2.value || "",
    score1: 0,
    score2: 0
  });
}

function update(gameId) {
  const p1 = document.getElementById(`p1-${gameId}`);
  const p2 = document.getElementById(`p2-${gameId}`);
  const s1 = document.getElementById(`s1-${gameId}`);
  const s2 = document.getElementById(`s2-${gameId}`);

  db.ref("games/game" + gameId).set({
    player1: p1.value || "",
    player2: p2.value || "",
    score1: Number(s1.value) || 0,
    score2: Number(s2.value) || 0
  });

  animateChange(s1);
  animateChange(s2);
}
</script>

</body>
</html>

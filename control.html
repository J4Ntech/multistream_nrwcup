<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
</head>

<body class="control">

<h2>Control Panel</h2>

<div id="loginBox">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3>Logged in ✔</h3>
  <button onclick="logout()">Logout</button>
  <div id="games"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD_vGptJ_ha6Z5Nk2DxjOejCWw75xevq7o",
  authDomain: "nrw-cup-multistream.firebaseapp.com",
  databaseURL: "https://nrw-cup-multistream-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nrw-cup-multistream"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

function login() {
  const email = document.getElementById("email").value;
  const pw = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, pw)
    .catch(err => alert(err.message));
}

function logout() {
  firebase.auth().signOut();
}

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadUI();
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

function loadUI() {
  const gameContainer = document.getElementById("games");

  const titles = [
    "Tru4 Stream Layout",
    "Tarik Stream Layout",
    "Set 3 (UNTEN LINKS)",
    "Set 4 (UNTEN RECHTS)"
  ];

  gameContainer.innerHTML = "";

  for (let i = 1; i <= 4; i++) {
    const box = document.createElement("div");

    box.style.border = "1px solid #444";
    box.style.padding = "12px";
    box.style.margin = "10px";
    box.style.borderRadius = "8px";

    box.innerHTML = `
      <div style="font-weight:bold; margin-bottom:8px; font-size:16px;">
        ${titles[i - 1]}
      </div>

      <input id="p1-${i}" placeholder="Spieler 1"><br>
      <input id="p2-${i}" placeholder="Spieler 2"><br>

      <input id="s1-${i}" type="number" placeholder="Score 1"><br>
      <input id="s2-${i}" type="number" placeholder="Score 2"><br><br>

      <input id="round-${i}" placeholder="Runde"><br>
      <input id="phase-${i}" placeholder="Phase"><br><br>

      <button onclick="update(${i})">Update Set ${i}</button>
      <button onclick="reset(${i})">Reset Score</button>
    `;

    gameContainer.appendChild(box);
  }
}

function update(gameId) {
  const p1 = document.getElementById(`p1-${gameId}`);
  const p2 = document.getElementById(`p2-${gameId}`);
  const s1 = document.getElementById(`s1-${gameId}`);
  const s2 = document.getElementById(`s2-${gameId}`);
  const round = document.getElementById(`round-${gameId}`);
  const phase = document.getElementById(`phase-${gameId}`);

  db.ref("games/game" + gameId).set({
    player1: p1.value || "",
    player2: p2.value || "",
    score1: Number(s1.value) || 0,
    score2: Number(s2.value) || 0,
    round: round.value || "",
    phase: phase.value || ""
  });
}

function reset(gameId) {
  const confirmReset = confirm("Willst du den Score wirklich resetten?");
  if (!confirmReset) return;

  const p1 = document.getElementById(`p1-${gameId}`);
  const p2 = document.getElementById(`p2-${gameId}`);
  const s1 = document.getElementById(`s1-${gameId}`);
  const s2 = document.getElementById(`s2-${gameId}`);
  const round = document.getElementById(`round-${gameId}`);
  const phase = document.getElementById(`phase-${gameId}`);

  p1.value = "Waiting...";
  p2.value = "for Game";

  // Scores resetten
  s1.value = 0;
  s2.value = 0;

  // Firebase updaten
  db.ref("games/game" + gameId).set({
    player1: "Waiting",
    player2: "for Game",
    score1: 0,
    score2: 0,
    round: round.value || "",
    phase: phase.value || ""
  });
}
</script>

</body>
</html>

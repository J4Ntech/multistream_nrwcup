<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="overlay">
  <span id="p1">Spieler 1</span>
  <span id="score">0 : 0</span>
  <span id="p2">Spieler 2</span>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD_vGptJ_ha6Z5Nk2DxjOejCWw75xevq7o",
  authDomain: "nrw-cup-multistream.firebaseapp.com",
  databaseURL: "https://nrw-cup-multistream-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nrw-cup-multistream"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params = new URLSearchParams(window.location.search);
const gameId = params.get("game") || "game1";

const ref = db.ref("games/" + gameId);

function animateScore(el) {
  el.classList.remove("changed");
  void el.offsetWidth;
  el.classList.add("changed");
}

ref.on("value", (snapshot) => {
  const data = snapshot.val();
  if (!data) return;

  const p1 = document.getElementById("p1");
  const p2 = document.getElementById("p2");
  const score = document.getElementById("score");

  p1.innerText = data.player1;
  p2.innerText = data.player2;

  const newScore = data.score1 + " : " + data.score2;

  if (score.innerText !== newScore) {
    score.innerText = newScore;
    animateScore(score);
  }
});
</script>

</body>
</html>

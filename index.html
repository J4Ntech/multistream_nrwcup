<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="overlay">
  <span id="p1">Spieler 1</span>
  <span id="score">0 : 0</span>
  <span id="p2">Spieler 2</span>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA5O9PjadztGZ8byyvwpkDC4ebMC62e2r8",
  authDomain: "scoreboard-4255b.firebaseapp.com",
  databaseURL: "https://scoreboard-4255b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "scoreboard-4255b"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ref = db.ref("game");

ref.on("value", (snapshot) => {
  const data = snapshot.val();

  if (!data) return;

  document.getElementById("p1").innerText = data.player1 ?? "Spieler 1";
  document.getElementById("p2").innerText = data.player2 ?? "Spieler 2";
  document.getElementById("score").innerText =
    (data.score1 ?? 0) + " : " + (data.score2 ?? 0);
});
});
</script>

</body>
</html>

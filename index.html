<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
</head>
<body class="overlay">

<div id="overlay">
  <div id="matchInfo">
    <div id="round">Winners Round 1</div>
    <div id="phase">Pool A1</div>
  </div>

  <span id="p1">Spieler 1</span>

  <span id="score">
    <span id="score1">0</span>
    <span id="score2">0</span>
  </span>

  <span id="p2">Spieler 2</span>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD_vGptJ_ha6Z5Nk2DxjOejCWw75xevq7o",
  authDomain: "nrw-cup-multistream.firebaseapp.com",
  databaseURL: "https://nrw-cup-multistream-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nrw-cup-multistream"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params = new URLSearchParams(window.location.search);
const gameId = params.get("game") || "game1";

const ref = db.ref("games/" + gameId);

function animateScore(el) {
  el.classList.remove("changed");
  void el.offsetWidth;
  el.classList.add("changed");
}

ref.on("value", (snapshot) => {
  const data = snapshot.val();
  if (!data) return;

  const round = document.getElementById("round");
  const phase = document.getElementById("phase");
  const p1 = document.getElementById("p1");
  const p2 = document.getElementById("p2");
  const score1 = document.getElementById("score1");
  const score2 = document.getElementById("score2");

  round.innerText = data.round || "";
  phase.innerText = data.phase || "";
  p1.innerText = data.player1 || "";
  p2.innerText = data.player2 || "";

  if (score1.innerText != data.score1) {
    score1.innerText = data.score1;
    animateScore(score1);
  }

  if (score2.innerText != data.score2) {
    score2.innerText = data.score2;
    animateScore(score2);
  }
});
</script>

</body>
</html>
